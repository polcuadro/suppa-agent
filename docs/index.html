<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>suppa-agent — setup wizard</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#e4e8f1;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.phase{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:20px;margin-bottom:12px}
.phase-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase}
.badge-terminal{background:#1e3a5f;color:#60a5fa}
.badge-manual{background:#422006;color:#f59e0b}
.cmd{background:#09090b;border:1px solid #27272a;border-radius:8px;padding:12px;font-family:monospace;font-size:13px;color:#a1a1aa;margin:8px 0;cursor:pointer;position:relative;word-break:break-all}
.cmd:hover{border-color:#3b82f6}
.cmd::after{content:'📋';position:absolute;right:8px;top:8px;font-size:14px}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-code{background:#1e3a5f;color:#60a5fa}
.step-manual{background:#422006;color:#f59e0b}
.note{font-size:12px;color:#f59e0b;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

function copyText(text) {
  try { navigator.clipboard.writeText(text) } catch {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function Cmd({text, multiline}) {
  const [copied, setCopied] = useState(false);
  const copy = () => { copyText(text); setCopied(true); setTimeout(() => setCopied(false), 2000) };
  return <div className="cmd" onClick={copy} style={multiline ? {whiteSpace:'pre-wrap',fontSize:12} : {}}>
    {copied ? '✅ Copied!' : text}
  </div>;
}

function Wizard() {
  const [step, setStep] = useState(0);
  const [name, setName] = useState('');
  const [slug, setSlug] = useState('');
  const [email, setEmail] = useState('');
  const [apiKey, setApiKey] = useState('');

  const toSlug = s => s.toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,30);
  const autoSlug = v => { setName(v); if (!slug || slug === toSlug(name)) setSlug(toSlug(v)) };
  const valid = name.length >= 2 && slug.length >= 4 && email.includes('@') && apiKey.startsWith('AIza') && apiKey.length >= 30;

  const input = {width:'100%',padding:'10px 14px',background:'#1c1c21',color:'#e4e8f1',border:'1px solid #27272a',borderRadius:8,fontSize:14,outline:'none',marginTop:4};
  const label = {fontSize:13,color:'#a1a1aa',display:'block',marginTop:14};
  const btn = (active) => ({padding:'12px 28px',background:active?'#3b82f6':'#27272a',color:active?'#fff':'#52525b',border:'none',borderRadius:10,fontSize:15,fontWeight:600,cursor:active?'pointer':'default',width:'100%',marginTop:20});

  const codePrompt1 = `firebase projects:create ${slug} --display-name "${name}"
firebase projects:addfirebase ${slug}`;

  const codePrompt2 = `gcloud firestore databases create --project=${slug} --location=eur3 --type=firestore-native
gcloud services enable secretmanager.googleapis.com --project=${slug}
firebase apps:create web "${name}" --project=${slug}
firebase apps:sdkconfig web --project=${slug}`;

  const codePrompt3 = `firebase use ${slug}
firebase functions:secrets:set GEMINI_API_KEY --project=${slug}`;

  const codePromptGenerate = `Generate ALL project files for a suppa-agent app in folder ${slug}/ with these specs:

PROJECT: ${name} (slug: ${slug})
OWNER: ${email}
MODEL: gemini-2.5-flash
REGION: europe-west1

FEATURES:
- React + Vite frontend, dark theme (#0a0f1c), DM Sans font
- Mobile responsive sidebar (hamburger menu on <768px)  
- Google login with whitelist (authorizedUsers collection in Firestore)
- Chat with Gemini 2.5 Flash, message ordering by seq field (integer, not timestamp), persistent history
- Chat history cleanup before sending to Gemini: strip leading 'model' messages, merge consecutive same-role messages
- Retry with exponential backoff (3 attempts: 2s/5s/8s delays) for errors containing: 503, 429, Service Unavailable, overloaded, high demand, RESOURCE_EXHAUSTED. After 3 failures, fallback to gemini-2.0-flash
- After each successful Gemini response, save token usage to brain/usage document: tokensIn, tokensOut, tokensTotal, maxTokens (1048576), percentage
- BrainPanel modal with 3 tabs: Users (add/remove authorized users), Language (12 langs: ca,de,en,es,fr,it,ja,ko,nl,pt,ru,zh), Context (loads all chat messages into editable textarea, shows token usage bar as % of 1M tokens, save/clear buttons calling saveBrainContext)
- saveBrainContext Cloud Function (admin-only, saves to brain/context in Firestore)
- brain/context document used as systemInstruction in Gemini calls
- i18n.js with 12 languages, auto-detect browser lang, persist in localStorage
- Firestore security rules for: chats (owner), messages (parent owner), authorizedUsers (read: auth, write: admin), brain (read: auth, write: admin), users (own uid)
- firestore.indexes.json with composite index: chats (ownerId ASC + updatedAt DESC)
- All Cloud Functions: firebase-functions/v2 onCall, region europe-west1, Node 22
- functions: chatWithGemini, saveBrainContext, healthCheck
- CLAUDE.md with post-deploy checklist
- Vite config: outDir must be '../dist/web'. firebase.json hosting public must be 'dist/web'. These MUST match or the app shows a blank page.

Use the REAL firebaseConfig values from the previous step. Zero placeholders.
Button label for admin panel: "Brain" (no emoji).`;

  const codePromptDeploy = `cd ${slug}/web && npm install
cd ../functions && npm install
cd .. && firebase deploy --project=${slug}`;

  const codePromptPostDeploy = `Add allUsers as Cloud Run Invoker role to these 3 Cloud Run services in project ${slug}: chatWithGemini, healthCheck, saveBrainContext. Use gcloud commands:
gcloud run services add-iam-policy-binding chatWithGemini --region=europe-west1 --member=allUsers --role=roles/run.invoker --project=${slug}
gcloud run services add-iam-policy-binding healthCheck --region=europe-west1 --member=allUsers --role=roles/run.invoker --project=${slug}
gcloud run services add-iam-policy-binding saveBrainContext --region=europe-west1 --member=allUsers --role=roles/run.invoker --project=${slug}

Then create the first admin user in Firestore:
Use firebase admin or gcloud to add a document to collection authorizedUsers with document ID "${email}" and field role="admin" in project ${slug}.`;

  return (
    <div style={{maxWidth:620,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <h1 style={{fontSize:28,fontWeight:700}}>suppa-agent</h1>
        <p style={{color:'#52525b',fontSize:13,marginTop:4}}>Private AI app wizard · Code-first setup</p>
      </div>

      {step === 0 && (
        <div className="phase">
          <h2 style={{fontSize:22,marginBottom:12}}>Build your private AI app</h2>
          <p style={{color:'#a1a1aa',lineHeight:1.6,marginBottom:16}}>In ~20 minutes you'll have your own AI chat app on Firebase. Claude Code does almost everything — you only touch Firebase Console twice.</p>
          <p style={{fontSize:14,fontWeight:600,marginBottom:8}}>You need:</p>
          <div style={{color:'#d4d4d8',fontSize:14}}>
            <div style={{padding:'6px 0'}}>→ Claude Pro with Claude Code</div>
            <div style={{padding:'6px 0'}}>→ A Google account (Gmail)</div>
            <div style={{padding:'6px 0'}}>→ A credit card (Firebase Blaze — stays at $0)</div>
            <div style={{padding:'6px 0'}}>→ <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" style={{color:'#3b82f6'}}>A free Gemini API key (get it here) →</a></div>
          </div>
          <button onClick={() => setStep(1)} style={btn(true)}>Start →</button>
        </div>
      )}

      {step === 1 && (
        <div className="phase">
          <h2 style={{fontSize:20,marginBottom:4}}>Your app info</h2>
          <label style={label}>App name</label>
          <input value={name} onChange={e => autoSlug(e.target.value)} placeholder="My Assistant" style={input}/>
          <label style={label}>Project ID (slug)</label>
          <input value={slug} onChange={e => setSlug(toSlug(e.target.value))} placeholder="my-assistant" style={input}/>
          {slug && <div className="note">⚠️ This becomes your Firebase Project ID and URL. Can't change later.</div>}
          <label style={label}>Owner Gmail</label>
          <input value={email} onChange={e => setEmail(e.target.value.trim())} placeholder="you@gmail.com" type="email" style={input}/>
          <label style={label}>Gemini API key</label>
          <input value={apiKey} onChange={e => setApiKey(e.target.value.trim())} placeholder="AIza..." style={input}/>
          <div style={{display:'flex',gap:8,marginTop:20}}>
            <button onClick={() => setStep(0)} style={{...btn(true),background:'#27272a',color:'#a1a1aa',width:'auto',padding:'12px 20px'}}>←</button>
            <button onClick={() => valid && setStep(2)} style={{...btn(valid),flex:1}}>Generate steps →</button>
          </div>
        </div>
      )}

      {step >= 2 && (
        <div>
          <div style={{fontSize:12,color:'#52525b',marginBottom:16,textAlign:'center'}}>
            {name} · {slug}.web.app · {email}
          </div>

          {/* PHASE 0: Manual login */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-manual">0</div>
              <div><strong>Login to Firebase</strong> <span className="badge badge-manual">YOU</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>Open PowerShell (not Code) and run:</p>
            <Cmd text="npx firebase login --reauth"/>
            <p style={{color:'#a1a1aa',fontSize:12}}>Login with <strong>{email}</strong> in the browser. Then come back here.</p>
          </div>

          {/* PHASE 1: Create project */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">1</div>
              <div><strong>Create Firebase project</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>Copy and paste into Claude Code:</p>
            <Cmd text={codePrompt1} multiline/>
          </div>

          {/* PHASE 2: Manual Blaze + Auth */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-manual">2</div>
              <div><strong>Blaze + Google Auth</strong> <span className="badge badge-manual">YOU</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>Open these 2 links and do what they say:</p>
            <div style={{fontSize:13,marginBottom:6}}>
              <a href={`https://console.firebase.google.com/project/${slug}/usage/details`} target="_blank" rel="noreferrer" style={{color:'#3b82f6'}}>
                a) Upgrade to Blaze plan →
              </a>
              <span style={{color:'#71717a',fontSize:12}}> (enter card, stays at $0)</span>
            </div>
            <div style={{fontSize:13}}>
              <a href={`https://console.firebase.google.com/project/${slug}/authentication/providers`} target="_blank" rel="noreferrer" style={{color:'#3b82f6'}}>
                b) Enable Google Auth →
              </a>
              <span style={{color:'#71717a',fontSize:12}}> (enable Google, set email to {email}, Save)</span>
            </div>
          </div>

          {/* PHASE 3: Setup services */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">3</div>
              <div><strong>Setup services + get config</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>Copy and paste into Claude Code:</p>
            <Cmd text={codePrompt2} multiline/>
            <div className="note">Code will show you the firebaseConfig values. They'll be used in the next step.</div>
          </div>

          {/* PHASE 4: Secrets */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">4</div>
              <div><strong>Link project + save API key</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <Cmd text={codePrompt3} multiline/>
            <div className="note">When asked for the secret value, paste: {apiKey}</div>
          </div>

          {/* PHASE 5: Generate files */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">5</div>
              <div><strong>Generate all project files</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>This is the big one — Code generates the entire app:</p>
            <Cmd text={codePromptGenerate} multiline/>
          </div>

          {/* PHASE 6: Deploy */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">6</div>
              <div><strong>Install + deploy</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <Cmd text={codePromptDeploy} multiline/>
          </div>

          {/* PHASE 7: Post-deploy */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-code">7</div>
              <div><strong>Post-deploy setup</strong> <span className="badge badge-terminal">CODE</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13,marginBottom:8}}>Copy and paste — Code handles Cloud Run permissions + first admin:</p>
            <Cmd text={codePromptPostDeploy} multiline/>
          </div>

          {/* PHASE 8: Index */}
          <div className="phase">
            <div className="phase-header">
              <div className="step-num step-manual">8</div>
              <div><strong>Create Firestore index</strong> <span className="badge badge-manual">YOU</span></div>
            </div>
            <p style={{color:'#a1a1aa',fontSize:13}}>
              Open <a href={`https://${slug}.web.app`} target="_blank" rel="noreferrer" style={{color:'#3b82f6'}}>{slug}.web.app</a> → 
              you'll see an error with a link → click the link → Create index → wait 2 minutes → reload.
            </p>
          </div>

          {/* DONE */}
          <div className="phase" style={{textAlign:'center',borderColor:'#065f46'}}>
            <div style={{fontSize:28,marginBottom:8}}>🎉</div>
            <h2 style={{fontSize:20}}>Your app is live!</h2>
            <p style={{color:'#a1a1aa',fontSize:14,marginTop:8}}>
              Open <a href={`https://${slug}.web.app`} target="_blank" rel="noreferrer" style={{color:'#3b82f6'}}>{slug}.web.app</a>, 
              login with {email}, send a message. Open Brain → Context to see your tokens.
            </p>
          </div>

          <button onClick={() => setStep(1)} style={{...btn(true),background:'#27272a',color:'#a1a1aa',marginTop:8}}>← Edit config</button>
        </div>
      )}

      <div style={{textAlign:'center',marginTop:32,fontSize:11,color:'#27272a'}}>suppa-agent v0.002 · by polcuadro</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Wizard));
</script>
</body>
</html>
